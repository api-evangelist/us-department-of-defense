description: >-
  The US Department of Defense is responsible for providing the military forces needed
  to deter war and protect the security of the United States. This includes overseeing
  the Army, Navy, Marine Corps, and Air Force, as well as coordinating with other
  defense agencies and organizations. The Department of Defense also plays a critical
  role in developing military strategies, acquiring and maintaining weapons and equipment,
  and ensuring the readiness and effectiveness of the armed forces.
