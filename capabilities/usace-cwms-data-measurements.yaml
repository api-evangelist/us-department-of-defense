naftiko: 1.0.0-alpha2
info:
  label: USACE Corps Water Management System Data API — Measurements
  description: 'USACE Corps Water Management System Data API — Measurements. 1 operations. Lead operation: Get Field Measurements.
    Self-contained Naftiko capability covering one Us Department Of Defense business surface.'
  tags:
  - Us Department Of Defense
  - Measurements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_DEPARTMENT_OF_DEFENSE_API_KEY: US_DEPARTMENT_OF_DEFENSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: usace-cwms-data-measurements
    baseUri: https://cwms-data.usace.army.mil/cwms-data/api/latest
    description: USACE Corps Water Management System Data API — Measurements business capability. Self-contained, no shared
      references.
    resources:
    - name: measurements
      path: /measurements
      operations:
      - name: getmeasurements
        method: GET
        description: Get Field Measurements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: office
          in: query
          type: string
          description: USACE district office ID
        - name: location-id
          in: query
          type: string
          description: CWMS location identifier
        - name: unit-system
          in: query
          type: string
          description: Unit system for output values (EN or SI)
        - name: begin
          in: query
          type: string
          description: Start of time window
        - name: end
          in: query
          type: string
          description: End of time window
  exposes:
  - type: rest
    namespace: usace-cwms-data-measurements-rest
    port: 8080
    description: REST adapter for USACE Corps Water Management System Data API — Measurements. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/measurements
      name: measurements
      description: REST surface for measurements.
      operations:
      - method: GET
        name: getmeasurements
        description: Get Field Measurements
        call: usace-cwms-data-measurements.getmeasurements
        with:
          office: rest.office
          location-id: rest.location-id
          unit-system: rest.unit-system
          begin: rest.begin
          end: rest.end
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usace-cwms-data-measurements-mcp
    port: 9090
    transport: http
    description: MCP adapter for USACE Corps Water Management System Data API — Measurements. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-field-measurements
      description: Get Field Measurements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usace-cwms-data-measurements.getmeasurements
      with:
        office: tools.office
        location-id: tools.location-id
        unit-system: tools.unit-system
        begin: tools.begin
        end: tools.end
      outputParameters:
      - type: object
        mapping: $.
