naftiko: 1.0.0-alpha2
info:
  label: USACE Corps Water Management System Data API — Offices
  description: 'USACE Corps Water Management System Data API — Offices. 1 operations. Lead operation: Get USACE Offices. Self-contained
    Naftiko capability covering one Us Department Of Defense business surface.'
  tags:
  - Us Department Of Defense
  - Offices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_DEPARTMENT_OF_DEFENSE_API_KEY: US_DEPARTMENT_OF_DEFENSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: usace-cwms-data-offices
    baseUri: https://cwms-data.usace.army.mil/cwms-data/api/latest
    description: USACE Corps Water Management System Data API — Offices business capability. Self-contained, no shared references.
    resources:
    - name: offices
      path: /offices
      operations:
      - name: getoffices
        method: GET
        description: Get USACE Offices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: usace-cwms-data-offices-rest
    port: 8080
    description: REST adapter for USACE Corps Water Management System Data API — Offices. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/offices
      name: offices
      description: REST surface for offices.
      operations:
      - method: GET
        name: getoffices
        description: Get USACE Offices
        call: usace-cwms-data-offices.getoffices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usace-cwms-data-offices-mcp
    port: 9090
    transport: http
    description: MCP adapter for USACE Corps Water Management System Data API — Offices. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-usace-offices
      description: Get USACE Offices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usace-cwms-data-offices.getoffices
      outputParameters:
      - type: object
        mapping: $.
